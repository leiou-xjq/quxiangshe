# ==========================================
# 生产环境配置
# 此文件需要通过环境变量注入敏感配置
# ==========================================

server:
  port: ${SERVER_PORT:8080}

spring:
  # 生产环境关闭开发特性
  main:
    allow-circular-references: false

  # 关闭 Flyway（生产环境使用独立迁移工具）
  flyway:
    enabled: false

  # 生产环境关闭 Swagger 文档
  doc:
    swagger-ui:
      enabled: false

  # 生产环境关闭 Knife4j
  knife4j:
    enable: false

  # MySQL 配置（使用环境变量）
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://mysql:3306/quxiangshe?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:quxiangshe}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis 配置（使用环境变量）
  data:
    redis:
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 50
          max-wait: 3000ms
          max-idle: 20
          min-idle: 5
      # 开启 SSL
      ssl:
        enabled: true

  # 邮件配置（使用环境变量）
  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # 生产环境关闭 H2 console
  h2:
    console:
      enabled: false

# MyBatis Plus - 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT 配置（必须使用环境变量）
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 900
  refresh-token-validity: 604800

# 接口限流 - 生产环境开启
rate-limit:
  enabled: true

# CORS 配置（生产环境必须配置）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# 内容审核配置（使用环境变量）
review:
  enabled: ${REVIEW_ENABLED:true}
  doubao:
    api-key: ${DOUBAO_API_KEY}

# 阿里云OSS配置（使用环境变量）
oss:
  aliyun:
    enabled: ${OSS_ENABLED:false}
    accessKeyId: ${OSS_ACCESS_KEY_ID}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
    bucketName: ${OSS_BUCKET_NAME:quxiangshe-prod}

# 日志配置 - 生产环境
logging:
  level:
    root: WARN
    com.quxiangshe: INFO
  file:
    name: /var/log/quxiangshe/application.log
    max-size: 100MB
    max-history: 60
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 生产环境关闭 Debug
debug: false