server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

spring:
  application:
    name: lixiang-backend

  main:
    allow-circular-references: true

  messages:
    encoding: UTF-8

  output:
    ansi:
      enabled: always

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/quxiangshe?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

  flyway:
    enabled: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: 2000ms
          max-idle: 8
          min-idle: 2

  # 邮件配置（QQ邮箱）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_SIZE:10MB}

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.quxiangshe.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT配置
jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: ${JWT_ACCESS_VALIDITY:900}
  refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800}
  token-prefix: "Bearer "
  header-name: Authorization

# 接口限流配置
rate-limit:
  enabled: true

# 粉丝活跃度配置
fans:
  threshold:
    active: 120.0
    normal: 20.0
    decay: 0.8
    big-blogger: 100000
  batch:
    db: 500
    redis: 5000

# Feed流配置
feed:
  blogger:
    small: 1000
    medium: 100000
  active-threshold: 120
  normal-threshold: 20
  active-push-batch-size: 1000

# 评论排序配置
comment:
  sort:
    threshold: 1000
    bucket-size: 100
    hot-threshold: 50

# 腾讯云短信配置（已废弃，改用邮件验证码）
sms:
  tencent:
    secret-id: ${SMS_SECRET_ID:}
    secret-key: ${SMS_SECRET_KEY:}
    app-id: ${SMS_APP_ID:}
    sign-name: 趣享社
    template-id: ${SMS_TEMPLATE_ID:}
  expire-seconds: 300
  mock-enabled: ${SMS_MOCK_ENABLED:true}

# 自定义邮件配置
mail:
  expire-seconds: ${MAIL_EXPIRE_SECONDS:300}

# 阿里云OSS配置
oss:
  aliyun:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    accessKeyId: ${OSS_ACCESS_KEY_ID:}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET:}
    bucketName: ${OSS_BUCKET_NAME:quxiangshe-img}
    enabled: ${OSS_ENABLED:false}
  image:
    compress-enabled: true
    thumbnail-enabled: true
    quality: 0.8

# FFmpeg视频转码配置
ffmpeg:
  path: ${FFMPEG_PATH:ffmpeg}
  timeout: 300

# 内容审核配置
review:
  enabled: ${REVIEW_ENABLED:true}
  mode: async
  async-enabled: ${REVIEW_ASYNC_ENABLED:true}
  value-review-enabled: ${VALUE_REVIEW_ENABLED:true}
  # 信誉分阈值：>=此值走同步审核（快速通道），<此值走异步审核
  sync-review-threshold: ${REVIEW_SYNC_THRESHOLD:80}
  doubao:
    api-key: ${DOUBAO_API_KEY:}
    endpoint: ${DOUBAO_ENDPOINT:ep-20260428080756-pbltx}
    base-url: ${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
    model: ${DOUBAO_MODEL:doubao-1-5-lite-32k-250115}
    timeout: 30000

# 用户信誉分配置
reputation:
  # 信誉分规则
  initial-score: 50          # 新用户初始分
  max-score: 100             # 上限
  min-score: 0               # 下限
  # 增加分数配置
  increase:
    review-passed: 2         # 审核通过+2分
    daily-limit: 10          # 单日增加上限
  # 减少分数配置
  decrease:
    review-rejected: 5       # 审核违规-5分
    report-confirmed: 10     # 举报核实-10分
    spam-detected: 20        # 恶意刷量-20分

# Embedding服务配置（豆包向量嵌入）
embedding:
  doubao:
    endpoint: ${EMBEDDING_ENDPOINT:}
    api-key: ${EMBEDDING_API_KEY:}
    model: ${EMBEDDING_MODEL:doubao-embedding-v1}
    timeout: 10

# Milvus向量数据库配置（RAG违规案例检索）
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: ${MILVUS_COLLECTION:violation_cases}
  dimension: ${MILVUS_DIMENSION:768}
  timeout: 10

# RAG功能配置
rag:
  enabled: ${RAG_ENABLED:true}
  top-k: ${RAG_TOP_K:5}
  similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.7}

# 微信登录配置
wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  enabled: ${WECHAT_ENABLED:false}

# Knife4j文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.quxiangshe.backend.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
  basic:
    enable: false

# 日志配置
logging:
  level:
    root: INFO
    com.quxiangshe: ${LOG_LEVEL:INFO}
  charset:
    file: UTF-8
    console: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/quxiangshe.log
    max-size: 10MB
    max-history: 30

pusher:
  app-id: ${PUSHER_APP_ID:}
  key: ${PUSHER_KEY:}
  secret: ${PUSHER_SECRET:}
  cluster: ${PUSHER_CLUSTER:ap3}